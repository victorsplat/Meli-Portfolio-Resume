<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D3277" />
      <stop offset="100%" stop-color="#585FD9" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#41468B" />
      <stop offset="100%" stop-color="#2D3277" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#585FD9" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#2D3277" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D3277" stop-opacity="0.12" />
      <stop offset="80%" stop-color="#2D3277" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#2D3277" stop-opacity="0.02" />
    </radialGradient>
  </defs>

  <style>
    .ring-outer {
      animation: rotate-outer 4s ease-in-out infinite;
      transform-origin: 150px 150px;
    }
    .ring-inner {
      animation: rotate-inner 3s ease-in-out infinite;
      transform-origin: 150px 150px;
    }
    .ring-mid {
      animation: rotate-mid 6s linear infinite;
      transform-origin: 150px 150px;
    }
    .pulse-dot {
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .fade-pulse {
      animation: fade-pulse 2.4s ease-in-out infinite;
    }

    @keyframes rotate-outer {
      0%   { transform: rotate(0deg); }
      50%  { transform: rotate(180deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes rotate-inner {
      0%   { transform: rotate(0deg); }
      50%  { transform: rotate(-180deg); }
      100% { transform: rotate(-360deg); }
    }
    @keyframes rotate-mid {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse-dot {
      0%, 100% { r: 4; opacity: 0.4; }
      50%       { r: 8; opacity: 0.9; }
    }
    @keyframes fade-pulse {
      0%, 100% { opacity: 0.2; }
      50%      { opacity: 0.6; }
    }
  </style>

  <rect width="300" height="300" rx="12" fill="url(#bgGrad)" />

  <circle class="ring-outer"
    cx="150" cy="150" r="110"
    fill="none" stroke="url(#grad1)" stroke-width="2"
    stroke-dasharray="80 160 40 160"
    stroke-linecap="round"
    filter="url(#glow)"
    opacity="0.6"
  />

  <circle class="ring-mid"
    cx="150" cy="150" r="85"
    fill="none" stroke="url(#grad2)" stroke-width="1.5"
    stroke-dasharray="60 200"
    stroke-linecap="round"
    opacity="0.4"
  />

  <circle class="ring-inner"
    cx="150" cy="150" r="55"
    fill="none" stroke="url(#grad3)" stroke-width="3"
    stroke-dasharray="140 210"
    stroke-linecap="round"
    filter="url(#glow)"
    opacity="0.8"
  />

  <circle class="pulse-dot"
    cx="150" cy="150"
    fill="#585FD9"
    filter="url(#glow)"
  />

  <g class="ring-outer" opacity="0.5">
    <circle cx="150" cy="40" r="3" fill="#585FD9" class="fade-pulse" />
  </g>
  <g class="ring-inner" opacity="0.4">
    <circle cx="150" cy="95" r="2.5" fill="#41468B" class="fade-pulse" style="animation-delay: -0.8s" />
  </g>
  <g class="ring-mid" opacity="0.3">
    <circle cx="150" cy="65" r="2" fill="#2D3277" class="fade-pulse" style="animation-delay: -1.6s" />
  </g>
</svg>
