<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D3277" />
      <stop offset="100%" stop-color="#585FD9" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#41468B" />
      <stop offset="100%" stop-color="#2D3277" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#585FD9" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#2D3277" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D3277" stop-opacity="0.12" />
      <stop offset="80%" stop-color="#2D3277" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#2D3277" stop-opacity="0.02" />
    </radialGradient>
  </defs>

  <rect width="300" height="300" rx="12" fill="url(#bgGrad)" />

  <g>
    <circle cx="150" cy="150" r="110"
      fill="none" stroke="url(#grad1)" stroke-width="2"
      stroke-dasharray="80 160 40 160"
      stroke-linecap="round"
      filter="url(#glow)"
      opacity="0.6"
    />
    <animateTransform attributeName="transform" type="rotate"
      from="0 150 150" to="360 150 150"
      dur="4s" repeatCount="indefinite" />
  </g>

  <g>
    <circle cx="150" cy="150" r="85"
      fill="none" stroke="url(#grad2)" stroke-width="1.5"
      stroke-dasharray="60 200"
      stroke-linecap="round"
      opacity="0.4"
    />
    <animateTransform attributeName="transform" type="rotate"
      from="0 150 150" to="360 150 150"
      dur="6s" repeatCount="indefinite" />
  </g>

  <g>
    <circle cx="150" cy="150" r="55"
      fill="none" stroke="url(#grad3)" stroke-width="3"
      stroke-dasharray="140 210"
      stroke-linecap="round"
      filter="url(#glow)"
      opacity="0.8"
    />
    <animateTransform attributeName="transform" type="rotate"
      from="0 150 150" to="-360 150 150"
      dur="3s" repeatCount="indefinite" />
  </g>

  <circle cx="150" cy="150" r="6" fill="#585FD9" filter="url(#glow)">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite" />
  </circle>

  <g>
    <circle cx="150" cy="40" r="3" fill="#585FD9" opacity="0.5">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <animateTransform attributeName="transform" type="rotate"
      from="0 150 150" to="360 150 150"
      dur="4s" repeatCount="indefinite" />
  </g>

  <g>
    <circle cx="150" cy="95" r="2.5" fill="#41468B" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.4s" begin="-0.8s" repeatCount="indefinite" />
    </circle>
    <animateTransform attributeName="transform" type="rotate"
      from="0 150 150" to="-360 150 150"
      dur="3s" repeatCount="indefinite" />
  </g>

  <g>
    <circle cx="150" cy="65" r="2" fill="#2D3277" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.4s" begin="-1.6s" repeatCount="indefinite" />
    </circle>
    <animateTransform attributeName="transform" type="rotate"
      from="0 150 150" to="360 150 150"
      dur="6s" repeatCount="indefinite" />
  </g>
</svg>
